<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador de Email</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <h1>Validador de Email</h1>
    
    <div class="caja">
        <p>Introduce tu correo electrónico:</p>
        
        <input type="email" id="emailUsuario" placeholder="ejemplo@correo.com">
        
        <div>
            <button onclick="validarEmail()">Validar</button>
        </div>
        
        <div class="resultado" id="resultado">
            Esperando email...
        </div>
    </div>

    <script src="logica.js"></script>
</body>
</html>
