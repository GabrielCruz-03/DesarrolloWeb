<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Empleados</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <h1>👥 Gestión de Empleados</h1>
    
    <div class="caja">
        <h2>➕ Añadir / Editar Empleado</h2>
        
        <form id="empleadoForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" placeholder="Ej: Juan" required>
                </div>
                
                <div class="form-group">
                    <label for="apellido">Apellido:</label>
                    <input type="text" id="apellido" placeholder="Ej: Pérez" required>
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="email">Correo electrónico:</label>
                    <input type="email" id="email" placeholder="ejemplo@empresa.com" required>
                </div>
                
                <div class="form-group">
                    <label for="telefono">Teléfono:</label>
                    <input type="tel" id="telefono" placeholder="+53 5 1234567" required>
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="salario">Salario (USD):</label>
                    <input type="number" id="salario" min="0" step="100" placeholder="Ej: 5000" required>
                </div>
                
                <div class="form-group">
                    <label for="fechaNacimiento">Fecha de nacimiento:</label>
                    <input type="date" id="fechaNacimiento" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="imagen">URL de la foto (opcional):</label>
                <input type="url" id="imagen" placeholder="https://ejemplo.com/foto.jpg">
                <small>Si no pones foto, usaremos una por defecto</small>
            </div>
            
            <div class="form-actions">
                <button type="button" onclick="guardarEmpleado()" id="btnGuardar">💾 Guardar Empleado</button>
                <button type="button" onclick="limpiarFormulario()" id="btnCancelar">🗑️ Cancelar</button>
            </div>
        </form>
        
        <div class="busqueda-filtros">
            <div class="busqueda">
                <label>🔍 Buscar empleado:</label>
                <input type="text" id="busqueda" placeholder="Nombre, email, teléfono..." onkeyup="filtrarEmpleados()">
            </div>
            
            <div class="filtros">
                <label>📊 Ordenar por:</label>
                <select id="ordenarPor" onchange="ordenarEmpleados()">
                    <option value="nombre">Nombre</option>
                    <option value="apellido">Apellido</option>
                    <option value="salario">Salario</option>
                    <option value="fechaNacimiento">Edad</option>
                </select>
            </div>
        </div>
        
        <div class="tarjetas-container" id="tarjetasContainer">
            <!-- Las tarjetas de empleados se cargarán aquí -->
        </div>
        
        <div class="total-empleados">
            Total de empleados: <span id="totalEmpleados">0</span>
        </div>
    </div>

    <script src="logica.js"></script>
</body>
</html>
