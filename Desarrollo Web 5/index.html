<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de GitHub</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <h1>Buscador de GitHub</h1>
    
    <div class="caja">
        <p>Introduce un usuario de GitHub:</p>
        
        <input type="text" id="usuarioGit" placeholder="Ej: google, microsoft, tu-usuario...">
        
        <div>
            <button onclick="buscarUsuario()">Buscar</button>
        </div>
        
        <div id="resultado" class="resultado">
            <p>Esperando búsqueda...</p>
        </div>
    </div>

    <script src="logica.js"></script>
</body>
</html>
