<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Cubano</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <h1>Inventario de Productos Cubanos</h1>
    
    <div class="caja">
        <h2>➕ Añadir / Editar Producto</h2>
        
        <form id="productoForm">
            <div class="form-group">
                <label for="nombre">Nombre del producto:</label>
                <input type="text" id="nombre" placeholder="Ej: Arroz, Frijoles, RON..." required>
            </div>
            
            <div class="form-group">
                <label for="categoria">Categoría:</label>
                <select id="categoria" required>
                    <option value="">Selecciona una categoría</option>
                    <option value="Alimentos">🍚 Alimentos</option>
                    <option value="Bebidas">🍹 Bebidas</option>
                    <option value="Electrodomésticos">📺 Electrodomésticos</option>
                    <option value="Transporte">🚲 Transporte</option>
                    <option value="Otros">📦 Otros</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="anio">Año de lanzamiento:</label>
                <input type="number" id="anio" min="1900" max="2026" placeholder="Ej: 2023" required>
            </div>
            
            <div class="form-actions">
                <button type="button" onclick="guardarProducto()" id="btnGuardar">💾 Guardar Producto</button>
                <button type="button" onclick="limpiarFormulario()" id="btnCancelar">🗑️ Cancelar</button>
            </div>
        </form>
        
        <div class="busqueda-filtros">
            <div class="busqueda">
                <label>🔍 Buscar:</label>
                <input type="text" id="busqueda" placeholder="Escribe para filtrar..." onkeyup="filtrarTabla()">
            </div>
            
            <div class="filtros">
                <label>📊 Filtrar por categoría:</label>
                <select id="filtroCategoria" onchange="filtrarTabla()">
                    <option value="Todas">Todas las categorías</option>
                    <option value="Alimentos">🍚 Alimentos</option>
                    <option value="Bebidas">🍹 Bebidas</option>
                    <option value="Electrodomésticos">📺 Electrodomésticos</option>
                    <option value="Transporte">🚲 Transporte</option>
                    <option value="Otros">📦 Otros</option>
                </select>
            </div>
        </div>
        
        <div class="tabla-container">
            <table id="tablaProductos">
                <thead>
                    <tr>
                        <th onclick="ordenarTabla('nombre')">📛 Nombre ⬆️⬇️</th>
                        <th onclick="ordenarTabla('categoria')">🏷️ Categoría ⬆️⬇️</th>
                        <th onclick="ordenarTabla('anio')">📅 Año ⬆️⬇️</th>
                        <th>⚙️ Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaBody">
                    <!-- Los productos se cargarán aquí -->
                </tbody>
            </table>
        </div>
        
        <div class="total-productos">
            Total de productos: <span id="totalProductos">0</span>
        </div>
    </div>

    <script src="logica.js"></script>
</body>
</html>
